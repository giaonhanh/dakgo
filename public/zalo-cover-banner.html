<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 400px; overflow: hidden; }

  .banner {
    width: 1200px; height: 400px;
    background: linear-gradient(135deg, #0d0a06 0%, #1a1000 40%, #2d1800 70%, #1a0d00 100%);
    position: relative; display: flex; align-items: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
  }

  /* Glow orbs */
  .orb1 {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,107,0,0.18) 0%, transparent 70%);
    top: -150px; right: 100px; pointer-events: none;
  }
  .orb2 {
    position: absolute; width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,140,0,0.12) 0%, transparent 70%);
    bottom: -80px; left: 200px; pointer-events: none;
  }

  /* Grid lines */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,107,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,107,0,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Left content */
  .left {
    padding: 0 70px; flex: 1; position: relative; z-index: 2;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(255,107,0,0.12); border: 1px solid rgba(255,107,0,0.35);
    border-radius: 20px; padding: 5px 14px; margin-bottom: 20px;
  }
  .badge-dot { width: 7px; height: 7px; background: #FF6B00; border-radius: 50%; }
  .badge-text { color: #FF8C00; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }

  .logo-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #FF6B00, #FF8C00);
    border-radius: 18px; display: flex; align-items: center; justify-content: center;
    font-size: 34px; box-shadow: 0 8px 30px rgba(255,107,0,0.4);
  }
  .logo-text { color: #fff; font-size: 48px; font-weight: 900; letter-spacing: -1px;
    text-shadow: 0 0 40px rgba(255,107,0,0.5); }
  .logo-sub { color: #FF8C00; font-size: 14px; font-weight: 500; margin-top: -4px;
    letter-spacing: 2px; text-transform: uppercase; }

  .tagline {
    color: #c8a878; font-size: 16px; font-weight: 400; margin-bottom: 28px;
    line-height: 1.5;
  }
  .tagline strong { color: #f8f0e0; font-weight: 600; }

  /* Service pills */
  .services { display: flex; gap: 10px; flex-wrap: wrap; }
  .svc {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; padding: 8px 14px;
    color: #e0d0b0; font-size: 14px; font-weight: 500;
  }
  .svc span { font-size: 18px; }

  /* Right visual */
  .right {
    width: 380px; position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    padding-right: 60px;
  }

  .phone-mock {
    width: 160px; height: 280px;
    background: linear-gradient(160deg, #1e1a14, #0d0a06);
    border-radius: 28px; border: 2px solid rgba(255,107,0,0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,107,0,0.15);
    position: relative; overflow: hidden; padding: 16px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .phone-notch {
    width: 50px; height: 6px; background: rgba(255,255,255,0.1);
    border-radius: 3px; margin: 0 auto 10px;
  }
  .mock-header {
    background: linear-gradient(90deg, #FF6B00, #FF8C00);
    border-radius: 10px; padding: 8px 10px;
    color: #fff; font-size: 11px; font-weight: 700;
    display: flex; align-items: center; gap: 5px;
  }
  .mock-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 7px 8px;
  }
  .mock-line { height: 6px; background: rgba(255,255,255,0.12); border-radius: 3px; margin-bottom: 4px; }
  .mock-line.short { width: 60%; }
  .mock-line.orange { background: rgba(255,107,0,0.4); width: 40%; }
  .mock-btn {
    background: linear-gradient(90deg, #FF6B00, #FFB347);
    border-radius: 6px; height: 22px; margin-top: 4px;
  }

  /* Floating bubbles */
  .bubble {
    position: absolute; background: rgba(255,107,0,0.1);
    border: 1px solid rgba(255,107,0,0.25); border-radius: 12px;
    padding: 6px 12px; color: #FF8C00; font-size: 12px; font-weight: 600;
    white-space: nowrap;
  }
  .b1 { top: 30px;  right: 40px; }
  .b2 { top: 110px; right: -10px; }
  .b3 { bottom: 60px; right: 50px; }

  /* Location strip */
  .location {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,107,0,0.15);
    padding: 10px 70px; display: flex; align-items: center; justify-content: space-between;
    z-index: 2;
  }
  .loc-left { display: flex; align-items: center; gap: 8px; color: #a08060; font-size: 13px; }
  .loc-left strong { color: #c8a878; }
  .loc-right { color: #6a5040; font-size: 12px; }
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>

  <!-- Left -->
  <div class="left">
    <div class="badge">
      <div class="badge-dot"></div>
      <span class="badge-text">ĐANG PHỤC VỤ</span>
    </div>

    <div class="logo-row">
      <div class="logo-icon">🛵</div>
      <div>
        <div class="logo-text">DakGo</div>
        <div class="logo-sub">Krông Pắc · Đắk Lắk</div>
      </div>
    </div>

    <div class="tagline">
      Giao hàng siêu tốc · Đặt đơn ngay trên <strong>Zalo</strong><br>
      Phục vụ Krông Pắc và các xã lân cận
    </div>

    <div class="services">
      <div class="svc"><span>🍜</span> Giao đồ ăn</div>
      <div class="svc"><span>🛒</span> Mua hộ</div>
      <div class="svc"><span>📦</span> Giao hộ</div>
      <div class="svc"><span>🏍️</span> Xe ôm</div>
      <div class="svc"><span>🚖</span> Taxi</div>
    </div>
  </div>

  <!-- Right -->
  <div class="right">
    <div class="phone-mock">
      <div class="phone-notch"></div>
      <div class="mock-header">🛵 DakGo</div>
      <div class="mock-card">
        <div class="mock-line"></div>
        <div class="mock-line short"></div>
        <div class="mock-line orange"></div>
        <div class="mock-btn"></div>
      </div>
      <div class="mock-card">
        <div class="mock-line short"></div>
        <div class="mock-line"></div>
      </div>
      <div class="mock-card">
        <div class="mock-line"></div>
        <div class="mock-line short"></div>
        <div class="mock-btn"></div>
      </div>
    </div>
    <div class="bubble b1">⚡ Giao trong 30 phút</div>
    <div class="bubble b2">📍 Krông Pắc</div>
    <div class="bubble b3">✅ Đặt qua Zalo</div>
  </div>

  <!-- Location strip -->
  <div class="location">
    <div class="loc-left">📍 <strong>Phục vụ:</strong> Krông Pắc · Ea Kly · Ea Yông · Ea Uy · Ea Tiêu</div>
    <div class="loc-right">dakgo.com</div>
  </div>
</div>
</body>
</html>
